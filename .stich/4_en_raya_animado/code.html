        .drop-animation {
            animation: dropWithBounce 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;

        @keyframes dropWithBounce {

            60% { transform: translateY(0); opacity: 1; }

            90% { transform: translateY(0); }

<script>
        let isIndigoTurn = true;
        const turnIndicator = document.getElementById('turn-indicator');
        const p1Card = document.getElementById('player1-card');
        const p2Card = document.getElementById('player2-card');

        function toggleTurn() {
            isIndigoTurn = !isIndigoTurn;
            
            // Update turn indicator visual
            turnIndicator.className = `w-4 h-4 rounded-full mx-auto mt-2 active-pulse shadow-lg ${isIndigoTurn ? 'token-indigo shadow-[0_0_15px_rgba(79,55,138,0.8)]' : 'token-coral shadow-[0_0_15px_rgba(255,138,128,0.8)]'}`;
            
            // Update Score Card Highlight
            if (isIndigoTurn) {
                p1Card.classList.add('active-pulse');
                p2Card.classList.remove('active-pulse');
            } else {
                p2Card.classList.add('active-pulse');
                p1Card.classList.remove('active-pulse');
            }
        }

        // Logic for column clicking
        document.querySelectorAll('.col-span-1').forEach(column => {
            column.addEventListener('click', () => {
                const emptySlots = Array.from(column.querySelectorAll('.slot:not(:has(.token-indigo)):not(:has(.token-coral))')).reverse();
                if (emptySlots.length > 0) {
                    const token = document.createElement('div');
                    token.className = `w-full h-full rounded-full drop-animation ${isIndigoTurn ? 'token-indigo' : 'token-coral'}`;
                    
                    emptySlots[0].appendChild(token);
                    
                    // Simple haptic feedback
                    if ('vibrate' in navigator) {
                        navigator.vibrate(25);
                    }

                    // Check for a fake "win" for demo purposes occasionally
                    if (Math.random() > 0.9) {
                        setTimeout(() => {
                           token.classList.add('win-glow');
                        }, 700);
                    }

                    toggleTurn();
                }
            });
        });

        // Restart button logic
        document.getElementById('restart-btn').addEventListener('click', () => {
            const tokens = document.querySelectorAll('.token-indigo, .token-coral');
            tokens.forEach((token, idx) => {
                setTimeout(() => {
                    token.style.transform = 'translateY(600px) rotate(45deg)';
                    token.style.opacity = '0';
                    token.style.transition = 'all 0.6s cubic-bezier(0.55, 0.055, 0.675, 0.19)';
                    setTimeout(() => token.remove(), 600);
                }, idx * 20); // Staggered removal
            });

            // Reset turn to Player 1
            if (!isIndigoTurn) toggleTurn();
        });
    </script>
