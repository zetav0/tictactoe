        .gloss-highlight {

            background: rgba(255, 255, 255, 0.4);
            filter: blur(2px);
            border-radius: 50%;

        .slot-inner-shadow {

            transform: translateY(2px);

        }
        .game-board-container {
            perspective: 1000px;
        }
        .game-board {
            transform: rotateX(5deg);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);

<script>
        // Simple micro-interaction for board slots
        document.querySelectorAll('.slot-inner-shadow').forEach(slot => {
            slot.addEventListener('mouseenter', () => {
                if (!slot.querySelector('.chip-red, .chip-yellow')) {
                    slot.style.backgroundColor = 'rgba(180, 197, 255, 0.4)';
                }
            });
            slot.addEventListener('mouseleave', () => {
                slot.style.backgroundColor = 'rgba(180, 197, 255, 0.2)';
            });
        });
    </script>
