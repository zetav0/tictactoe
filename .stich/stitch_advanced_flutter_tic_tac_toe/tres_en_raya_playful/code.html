<script>
        // Simple game logic simulation for interactivity
        const cells = document.querySelectorAll('.grid > div');
        cells.forEach(cell => {
            cell.addEventListener('click', () => {
                if (cell.children.length === 0) {
                    const sphere = document.createElement('div');
                    sphere.className = 'w-16 h-16 rounded-full bg-red-500 border-b-8 border-red-700 shadow-lg';
                    sphere.style.transform = "perspective(500px) rotateX(20deg)";
                    cell.appendChild(sphere);
                    
                    // Simple animation
                    sphere.animate([
                        { transform: 'scale(0) perspective(500px) rotateX(20deg)' },
                        { transform: 'scale(1.1) perspective(500px) rotateX(20deg)' },
                        { transform: 'scale(1) perspective(500px) rotateX(20deg)' }
                    ], {
                        duration: 300,
                        easing: 'cubic-bezier(0.175, 0.885, 0.32, 1.275)'
                    });
                }
            });
        });

        // Restart button interaction
        const restartBtn = document.querySelector('.btn-3d');
        restartBtn.addEventListener('click', () => {
            cells.forEach(cell => {
                cell.innerHTML = '';
            });
        });
    </script>
