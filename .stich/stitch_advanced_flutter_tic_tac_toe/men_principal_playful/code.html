<style>
        body {

            background: linear-gradient(180deg, #1e4de2 0%, #002a78 100%);
            overscroll-behavior: none;
        }

        .bubble-text {

            -webkit-text-stroke: 2px rgba(255,255,255,0.2);
        }

        .squishy-btn {
            position: relative;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .squishy-btn:active {
            transform: translateY(4px);
            box-shadow: none !important;
        }

        .inner-glow {
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.4);

        .lip-orange { box-shadow: 0 6px 0 #9c6a00; }
        .lip-green { box-shadow: 0 6px 0 #005e3a; }
        .lip-purple { box-shadow: 0 6px 0 #5b1a8c; }

        .medal-shimmer {
            animation: shimmer 3s infinite ease-in-out;
        }

        @keyframes shimmer {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }

        .bg-pattern {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);

<div class="relative medal-shimmer">

<script>
        // Micro-interactions for button presses
        document.querySelectorAll('.squishy-btn').forEach(button => {
            button.addEventListener('touchstart', () => {
                button.style.transform = 'translateY(4px)';
                button.style.boxShadow = 'none';
            });
            button.addEventListener('touchend', () => {
                button.style.transform = 'translateY(0)';
                // Restoration handled by CSS classes for standard interaction
            });
        });

        // Floating particles background effect
        function createParticle() {
            const particle = document.createElement('div');
            const size = Math.random() * 8 + 4;
            const startX = Math.random() * window.innerWidth;
            const duration = Math.random() * 15 + 10;
            
            particle.style.position = 'fixed';
            particle.style.bottom = '-20px';
            particle.style.left = `${startX}px`;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.backgroundColor = 'rgba(255, 255, 255, 0.1)';
            particle.style.borderRadius = '50%';
            particle.style.pointerEvents = 'none';
            particle.style.zIndex = '1';
            
            document.body.appendChild(particle);
            
            const anim = particle.animate([
                { transform: 'translateY(0) scale(1)', opacity: 0.1 },
                { transform: `translateY(-${window.innerHeight + 50}px) scale(2)`, opacity: 0 }
            ], {
                duration: duration * 1000,
                easing: 'linear'
            });
            
            anim.onfinish = () => particle.remove();
        }

        setInterval(createParticle, 1000);
    </script>
