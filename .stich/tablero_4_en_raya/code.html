<script>
        // Simple micro-interaction for column clicking
        document.querySelectorAll('.col-span-1').forEach(column => {
            column.addEventListener('click', () => {
                const emptySlots = Array.from(column.querySelectorAll('.slot:not(:has(.token-indigo)):not(:has(.token-coral))')).reverse();
                if (emptySlots.length > 0) {
                    const token = document.createElement('div');
                    // Alternate players for demo (random choice)
                    const isIndigo = Math.random() > 0.5;
                    token.className = `w-full h-full rounded-full drop-animation ${isIndigo ? 'token-indigo' : 'token-coral'}`;
                    emptySlots[0].appendChild(token);
                    
                    // Simple haptic feedback simulation
                    if ('vibrate' in navigator) {
                        navigator.vibrate(20);
                    }
                }
            });
        });

        // Restart button logic
        document.querySelector('button span.truncate').parentElement.addEventListener('click', () => {
            document.querySelectorAll('.token-indigo, .token-coral').forEach(token => {
                token.style.transform = 'translateY(500px)';
                token.style.opacity = '0';
                token.style.transition = 'all 0.5s ease-in';
                setTimeout(() => token.remove(), 500);
            });
        });
    </script>
