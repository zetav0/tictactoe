<script>
        function selectDifficulty(element) {
            // Reset all buttons
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('bg-primary', 'dark:bg-primary-fixed', 'text-on-primary', 'dark:text-on-primary-fixed', 'shadow-md');
                btn.classList.add('text-on-surface-variant', 'dark:text-outline-variant');
            });
            
            // Highlight selected
            element.classList.remove('text-on-surface-variant', 'dark:text-outline-variant');
            element.classList.add('bg-primary', 'dark:bg-primary-fixed', 'text-on-primary', 'dark:text-on-primary-fixed', 'shadow-md');
            
            // Haptic feedback simulation
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(5);
            }
        }

        // Simple enter animation
        document.addEventListener('DOMContentLoaded', () => {
            const mainContent = document.querySelector('main');
            mainContent.style.opacity = '0';
            mainContent.style.transform = 'translateY(10px)';
            mainContent.style.transition = 'all 0.6s ease-out';
            
            setTimeout(() => {
                mainContent.style.opacity = '1';
                mainContent.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
